<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP</title>
    <link rel="stylesheet" href="otp.css">
</head>
<body>
    <div class="container">
        <h2>OTP Verification</h2>

        <p>Please type the verification code sent to
            <span id="mobile">(0000) 000-0000</span>
        </p>     
        
        <p>The OTP will expire ni <span id="expire"></span></p>

        <div class="row">
            <input type="number" >
            <input type="number"  disabled>
            <input type="number"  disabled>
            <input type="number"  disabled>
        </div>

        <button type="button">Verify OTP</button>

        <p>Didn't recieve code
            <a href="javascript:void(0)" id="request">Request Again</a>
        </p>
    </div>
    

    <script src="otp.js"></script>
</body>
</html>
