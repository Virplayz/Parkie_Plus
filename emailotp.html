<!DOCTYPE html>
<html>
<head>
    <title>OTP Verification</title>
    <link rel="stylesheet" href="emailotp.css">
    <link rel="stylesheet" href="Payment.css">
</head>
<body>
    <div class="form">
        <h1>Verify your Identity</h1>
        <input type="email" id="email" placeholder="Enter Email...">
        <div class="otpverify" style="display:none;">
            <input type="text" id="otp_inp" placeholder="Enter the OTP sent to your Email...">
            <button class="btn" id="otp-btn">Verify</button>
        </div>
        <button class="btn" id="send-otp-button">Send OTP</button>
    </div>

    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <!-- Only load ONCE, at bottom of body -->
    <script src="emailotp.js"></script>
</body>
</html>
