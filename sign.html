<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="sign.css">
</head>
<body>
    <div id="main">
        <div class="center">
            <h1 id="tit">Become our Member</h1>
            <form method="post" id="mainForm">
                <div class="text_field">
                    <input type="text" id="yourName" required style="color:black">
                    <span></span>
                    <label>Your Name</label>
                </div>
                <div class="text_field">
                    <input type="email" id="email" required style="color:black">
                    <span></span>
                    <label>Email address</label>
                </div>
                <div class="text_field">
                    <input type="text" id="phoneNo" required style="color:black">
                    <span></span>
                    <label>Your Phone no.</label>
                </div>
                <button id="loggg"><a href="qrcode.html" href="qr.cdoe.css">Submit</a></button>
                <!-- <input type="submit" value="Sign-in" id="loggg"><a href="qrcode.html" href="qr.cdoe.css">submit</a> -->
               
               <button id="btn1">Submit</button>
            </form>

        </div>
       
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {  getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
           apiKey: "AIzaSyAmwP09kE7xoibi0tJLvrDX-GEmx1JntN4",
           authDomain: "parking-system-3bc50.firebaseapp.com",
           databaseURL: "https://parking-system-3bc50-default-rtdb.firebaseio.com",
           projectId: "parking-system-3bc50",
           storageBucket: "parking-system-3bc50.appspot.com",
           messagingSenderId: "671191659676",
           appId: "1:671191659676:web:317e696c77e8f55f0fe959",
           measurementId: "G-276RVTDFB9"
        };

       const app = initializeApp(firebaseConfig);
       const database = getDatabase(app);
       const mainDB = ref(database, 'main');

       document.getElementById('mainForm').addEventListener('submit', function(e) {
           submitForm(e);
       });

       function submitForm(e) {
           e.preventDefault();
           var yourName = getElementById('yourName');
           var email = getElementById('email');
           var phoneNo = getElementById('phoneNo');

           console.log('Values before saving:', yourName, email, phoneNo);

           saveMessages(yourName, email, phoneNo);
       }

       const saveMessages = (yourName, email, phoneNo) => {
           var main = push(mainDB);

           set(main, {
               Name: yourName,
               Email_address: email,
               Phone_no: phoneNo,
               Date_of_booking: new Date().toISOString() // assuming booking date is current date/time
           });

           console.log('Data saved successfully!');
       }

       const getElementById = (id) => {
           return document.getElementById(id).value;
       }
   </script>
</body>
</html>
