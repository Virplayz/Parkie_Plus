<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="AddParking.css">
</head>
<body>
    <div id="main">
        <div class="center">
            <h1>Become our Member</h1>
            <form id="mainForm">
                <div class="text_field">
                    <input type="text" id="Name" required placeholder="Name">
                    <span></span>
                </div>
                <div class="text_field">
                    <input type="text" id="BookingStartTime" required placeholder="Booking start time">
                    <span></span>
                </div>
                <div class="text_field">
                    <input type="text" id="BookingEndTime" required placeholder="Booking end time">
                    <span></span>
                </div>
                <div class="text_field">
                    <input type="email" id="EmailId" required placeholder="Email Id">
                    <span></span>
                </div>
                <div class="text_field">
                    <input type="tel" id="PhoneNo" required placeholder="Phone No">
                    <span></span>
                </div>
                <input type="submit" value="Sign-in" id="loggg">
                <a href="deva.html" id="bak">Back</a>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        const firebaseConfig = {

apiKey: "AIzaSyAmwP09kE7xoibi0tJLvrDX-GEmx1JntN4",

authDomain: "parking-system-3bc50.firebaseapp.com",

databaseURL: "https://parking-system-3bc50-default-rtdb.firebaseio.com",

projectId: "parking-system-3bc50",

storageBucket: "parking-system-3bc50.appspot.com",

messagingSenderId: "671191659676",

appId: "1:671191659676:web:317e696c77e8f55f0fe959",

measurementId: "G-276RVTDFB9"

};

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const mainDB = ref(database, 'main');

        document.getElementById('mainForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent form submission

            const form = e.target;
            const Name = form.Name.value;
            const BookingStartTime = form.BookingStartTime.value;
            const BookingEndTime = form.BookingEndTime.value;
            const EmailId = form.EmailId.value;
            const PhoneNo = form.PhoneNo.value;

            saveMessages(Name, BookingStartTime, BookingEndTime, EmailId, PhoneNo);
        });

        function saveMessages(Name, BookingStartTime, BookingEndTime, EmailId, PhoneNo) {
            const main = push(mainDB); // Create a new unique key under 'main'

            set(main, {
                "Name": Name,
                "Booking start time": BookingStartTime,
                "Booking end time": BookingEndTime,
                "Email Id": EmailId,
                "Phone no": PhoneNo,
                "Date_of_booking": new Date().toISOString() // Current date/time
            }).then(() => {
                // Data saved successfully, now redirect to OTP verification page
                window.location.href = "emailotp.html";
            }).catch((error) => {
                console.error('Error saving data:', error);
                // Handle error if data saving fails
            });
        }
    </script>
</body>
</html>
